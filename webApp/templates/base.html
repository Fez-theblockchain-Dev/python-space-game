{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Cowboys Store 🚀</title>

    <!-- stylesheet link -->
    <link rel="stylesheet" href="{% static 'css/default.css' %}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Stripe.js - Required for Apple Pay -->
    <script src="https://js.stripe.com/v3/"></script>
    
    <!-- Background image styling -->
    <style>
        body {
            --background-primary: url('{% static "images/main_menu_background.png" %}');
        }
    </style>

</head>
<body>
    <!-- Animated starfield background -->
    <div class="bg-animation"></div>
    
    <nav class="nav">
        <a href="/" class="logo">SPACE GAME</a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/shop/" class="nav-link">Shop</a>
        </div>
    </nav>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <footer>
        <div class="container footer-inner">
            <p class="footer-copy">&copy; 2026 Space Game. Secure payments powered by Stripe.</p>
            <nav class="footer-social" aria-label="Developer links">
                <a class="footer-social-link" href="{{ social_github_url }}" target="_blank" rel="noopener noreferrer" title="GitHub">
                    <span class="visually-hidden">GitHub</span>
                    <svg class="footer-social-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path fill="currentColor" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.416-4.042-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                </a>
                <a class="footer-social-link" href="{{ social_linkedin_url }}" target="_blank" rel="noopener noreferrer" title="LinkedIn">
                    <span class="visually-hidden">LinkedIn</span>
                    <svg class="footer-social-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path fill="currentColor" d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22 0H2C.895 0 0 .895 0 2v20c0 1.105.895 2 2 2h20c1.105 0 2-.895 2-2V2c0-1.105-.895-2-2-2z"/>
                    </svg>
                </a>
                <a class="footer-social-link" href="{{ social_route_url }}" target="_blank" rel="noopener noreferrer" title="Route">
                    <span class="visually-hidden">Route</span>
                    <svg class="footer-social-icon footer-social-icon--route" viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="5" cy="18" r="2.5" fill="currentColor" stroke="none"/>
                        <circle cx="19" cy="6" r="2.5" fill="currentColor" stroke="none"/>
                        <path d="M7.2 16.2C9 14 10.5 13 12.5 11.5S16 8.5 17.2 7.8" stroke="currentColor" fill="none"/>
                    </svg>
                </a>
            </nav>
        </div>
    </footer>
    
    <script src="{% static 'js/stripe.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
